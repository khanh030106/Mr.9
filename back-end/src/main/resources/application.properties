spring.application.name=back-end
spring.config.import=optional:file:../.env[.properties],optional:file:.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth?prompt=select_account

# ========== VNPAY CONFIG ==========
vnpay.tmn-code=${VNPAY_TMN_CODE}
vnpay.hash-secret=${VNPAY_HASH_SECRET}
vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}


#==================JWT CONFIG==================
jwt.secret=${JWT_SECRET}
jwt.access-expiration=900000
jwt.refresh-expiration=604800000

# Admin book form is multipart and can include many inputs, keep Tomcat limits high enough to avoid part-count failures.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB
server.tomcat.max-part-count=1000
server.tomcat.max-parameter-count=20000
server.tomcat.max-http-form-post-size=20MB

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG

app.backend-url=${APP_BACKEND_URL:http://localhost:8080}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
